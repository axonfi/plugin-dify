identity:
  name: get_payment_status
  author: axonfi
  label:
    en_US: Get Payment Status
    zh_Hans: 查询支付状态

description:
  human:
    en_US: Check the status of a previously submitted payment.
  llm: Check the status of an AxonFi payment by its request ID. Returns the current status (pending, confirmed, rejected, review) and transaction hash if available.

parameters:
  - name: request_id
    type: string
    required: true
    label:
      en_US: Request ID
    human_description:
      en_US: The request ID returned when the payment was submitted
    llm_description: The request ID returned from the pay tool when the payment was initially submitted
    form: llm

extra:
  python:
    source: tools/get_payment_status.py
